  version: '3.8'

  services:
    postgres:
      image: postgres:16-alpine
      container_name: toeic_tailor_db
      environment:
        POSTGRES_USER: root
        POSTGRES_PASSWORD: root
        POSTGRES_DB: toeic_tailor
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
      restart: unless-stopped

  volumes:
    postgres_data: